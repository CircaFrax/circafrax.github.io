<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CircaFrax</title>
<link rel="icon" href="assets/blason.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background-color:#0a1228;
    background-image:url('assets/wallpaper-nuit.webp');
    background-repeat:no-repeat;
    background-position:top center;
    background-size:100% auto;
    min-height:100vh;
    font-family:system-ui, sans-serif;
    color:#e8e6e3;
  }
  .banner{
    width:100%;
    display:flex;
    justify-content:center;
    padding:28px 20px;
    background:rgba(10,18,40,0.55);
  }
  .banner img{max-width:520px;width:90%;height:auto;}
  .content{max-width:680px;margin:40px auto;padding:0 20px 80px;}
  .checklist{
    list-style:none;
    border:1px solid rgba(212,175,55,0.25);
    background:rgba(10,18,40,0.7);
    border-radius:12px;
    overflow:hidden;
  }
  .checklist li{
    padding:16px 22px;
    border-bottom:1px solid rgba(212,175,55,0.12);
    font-size:17px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .checklist li:last-child{border-bottom:none}
  .checklist li::before{
    content:"○ ";
    color:#d4af37;
  }
  .checklist a{
    color:#e8e6e3;
    text-decoration:none;
    flex:1;
  }
  .checklist a:hover{color:#d4af37}
  .checklist li:hover{background:rgba(212,175,55,0.08)}

  .download-gold{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 8px;
    border:1px solid #d4af37;
    color:#d4af37;
    border-radius:7px;
    font-size:13px;
    font-weight:600;
    text-decoration:none;
    margin-left:12px;
    flex:none;
    white-space:nowrap;
  }
  .download-gold:hover{
    background:#d4af37;
    color:#0a1228;
  }
</style>
</head>
<body>
  <div class="banner">
    <img src="assets/banniere.png" alt="CircaFrax">
  </div>
  <div class="content">
    <ul class="checklist">
      <li><a href="https://github.com/CircaFrax/CircaFrax-OS" target="_blank">CircaFrax OS</a></li>
      <li><a href="https://github.com/CircaFrax/Mwangaza-OS" target="_blank">Mwangaza OS</a></li>
      <li>
        <a href="https://github.com/CircaFrax/CodexGenQrcode" target="_blank">CodexGenQrcode</a>
        <a href="https://github.com/CircaFrax/CodexGenQrcode/releases/download/v0.4.3/CodexGenQrcode_v0.4.3.zip" class="download-gold">⬇ Télécharger</a>
      </li>
      <li>
        <a href="https://github.com/CircaFrax/CodexHiddenWind" target="_blank">CodexHiddenWind</a>
        <a href="https://github.com/CircaFrax/CodexHiddenWind/releases/download/v1.3/CodexHiddenWind_v1.3_Portable.zip" class="download-gold">⬇ Télécharger</a>
      </li>
      <li><a href="https://github.com/CircaFrax/CodexNavigator" target="_blank">CodexNavigator</a></li>
      <li><a href="https://github.com/CircaFrax/CodexVortex" target="_blank">CodexVortex</a></li>
      <li><a href="https://github.com/CircaFrax/CodexMediaMusica" target="_blank">CodexMediaMusica</a></li>
      <li><a href="https://github.com/CircaFrax/CodexMediaVideo" target="_blank">CodexMediaVideo</a></li>
      <li><a href="https://github.com/CircaFrax/CodexMorphoAlpha" target="_blank">CodexMorphoAlpha</a></li>
      <li><a href="https://github.com/CircaFrax/CodexMorphoFrame" target="_blank">CodexMorphoFrame</a></li>
      <li><a href="https://github.com/CircaFrax/CodexMorphoIco" target="_blank">CodexMorphoIco</a></li>
    </ul>
  </div>
</body>
</html>
